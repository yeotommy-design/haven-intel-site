<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HavenIntel | Public View</title>
    <meta name="description" content="Public group-stage and tournament outlook voting from HavenIntel, open to all visitors with one vote per device.">
    <link rel="stylesheet" href="./shared-shell.css">
    <script defer src="./shared-shell.js?v=20260615-5"></script>
    <script defer src="./public-view.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #efe4d3;
        --paper: rgba(255, 250, 243, 0.9);
        --ink: #1c1713;
        --muted: #6f655d;
        --line: rgba(118, 98, 81, 0.18);
        --accent: #b44c21;
        --accent-2: #184f47;
        --accent-soft: rgba(180, 76, 33, 0.1);
        --green-soft: rgba(24, 79, 71, 0.1);
        --shadow: 0 24px 60px rgba(45, 29, 15, 0.1);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Baskerville, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        color: var(--ink);
      }

      main {
        max-width: 1240px;
        margin: 0 auto;
        padding: 24px 18px 80px;
      }

      .panel,
      .publicViewCard {
        background: var(--paper);
        backdrop-filter: blur(12px);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
      }

      .publicViewHero {
        position: relative;
        overflow: hidden;
        padding: 30px 26px;
        margin-bottom: 22px;
        background: linear-gradient(180deg, rgba(255, 250, 243, 0.95) 0%, rgba(248, 244, 236, 0.92) 100%);
      }

      .publicViewHero::after {
        content: "";
        position: absolute;
        width: 220px;
        height: 220px;
        border-radius: 999px;
        inset: auto -70px -100px auto;
        background: radial-gradient(circle, rgba(24, 79, 71, 0.12) 0%, rgba(24, 79, 71, 0.04) 58%, transparent 74%);
        pointer-events: none;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        padding: 7px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.83rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 14px;
        font-size: clamp(2.7rem, 6vw, 4.9rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .publicViewLead {
        max-width: 46rem;
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 1.04rem;
      }

      .publicViewHeroMeta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .publicViewFeaturedSection {
        margin-bottom: 24px;
      }

      .publicViewSectionBlock {
        margin-bottom: 26px;
      }

      .publicViewSectionIntro {
        margin-bottom: 16px;
      }

      .publicViewSectionIntro h2 {
        margin: 12px 0 8px;
        font-size: clamp(2rem, 4vw, 2.8rem);
        line-height: 0.98;
        letter-spacing: -0.03em;
      }

      .publicViewSectionIntro p {
        max-width: 44rem;
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .publicViewGrid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .publicViewCard {
        position: relative;
        overflow: hidden;
        padding: 24px 22px;
        background: linear-gradient(180deg, rgba(255, 250, 243, 0.95) 0%, rgba(248, 244, 236, 0.9) 100%);
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background-color 180ms ease;
      }

      .publicViewCard::after {
        content: "";
        position: absolute;
        width: 140px;
        height: 140px;
        border-radius: 999px;
        inset: auto -48px -76px auto;
        background: radial-gradient(circle, rgba(24, 79, 71, 0.1) 0%, rgba(24, 79, 71, 0.04) 54%, transparent 72%);
        pointer-events: none;
      }

      .publicViewCard:hover {
        transform: translateY(-4px);
        box-shadow: 0 28px 70px rgba(45, 29, 15, 0.14);
        border-color: rgba(24, 79, 71, 0.16);
      }

      .publicViewCard.featured {
        border-color: rgba(24, 79, 71, 0.2);
        box-shadow: 0 30px 78px rgba(45, 29, 15, 0.16);
      }

      .publicViewFeaturedLabel {
        display: inline-flex;
        align-items: center;
        margin-bottom: 10px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(24, 79, 71, 0.1);
        color: var(--accent-2);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .publicViewCardTop {
        display: grid;
        gap: 12px;
        margin-bottom: 16px;
      }

      .publicViewCardTop h3 {
        margin: 10px 0 10px;
        font-size: 1.65rem;
        line-height: 1.08;
      }

      .publicViewCardTop p,
      .publicViewVotePrompt,
      .publicViewResultMeta,
      .publicViewFoot {
        color: var(--muted);
        line-height: 1.6;
      }

      .publicViewVotePrompt {
        margin-bottom: 2px;
        font-size: 0.96rem;
      }

      .publicViewMeta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .publicViewMeta span {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid var(--line);
        font-size: 0.84rem;
        font-weight: 700;
        color: var(--accent-2);
      }

      .publicViewOptionGrid,
      .publicViewResults {
        display: grid;
        gap: 12px;
      }

      .publicViewOptionButton {
        width: 100%;
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.84) 0%, rgba(255, 255, 255, 0.64) 100%);
        color: var(--ink);
        font: inherit;
        font-size: 1.02rem;
        font-weight: 700;
        text-align: left;
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease, background-color 140ms ease;
      }

      .publicViewOptionButton:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 28px rgba(45, 29, 15, 0.1);
        border-color: rgba(24, 79, 71, 0.22);
        background: rgba(255, 255, 255, 0.96);
      }

      .publicViewResultRow {
        padding: 15px 15px 13px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.62);
      }

      .publicViewResultRow.selected {
        border-color: rgba(24, 79, 71, 0.24);
        background: rgba(24, 79, 71, 0.08);
      }

      .publicViewResultTop {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .publicViewResultTop strong {
        font-size: 1.04rem;
      }

      .publicViewResultTop span {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--accent-2);
      }

      .publicViewBarTrack {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: rgba(28, 23, 19, 0.08);
        overflow: hidden;
      }

      .publicViewBarFill {
        display: block;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #184f47 0%, #2f7469 100%);
      }

      .publicViewFoot {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
        font-size: 0.92rem;
      }

      .siteFooterPill {
        background: rgba(24, 79, 71, 0.08);
        color: var(--accent-2);
      }

      @media (max-width: 900px) {
        .publicViewGrid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        main {
          padding-left: 14px;
          padding-right: 14px;
        }

        h1 {
          font-size: clamp(2.1rem, 8.2vw, 3.1rem);
          line-height: 0.98;
        }

        .publicViewCardTop h3 {
          font-size: 1.4rem;
        }

        .publicViewSectionIntro h2 {
          font-size: 1.75rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section data-public-view-page></section>
    </main>
  </body>
</html>
