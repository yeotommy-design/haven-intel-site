<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HavenIntel | Admin Access</title>
    <meta name="robots" content="noindex,nofollow">
    <style>
      :root {
        color-scheme: light;
        --bg: #efe4d3;
        --panel: rgba(255, 250, 243, 0.92);
        --ink: #1c1713;
        --muted: #6f655d;
        --line: rgba(118, 98, 81, 0.18);
        --accent: #b44c21;
        --accent-2: #184f47;
        --shadow: 0 24px 60px rgba(45, 29, 15, 0.1);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Baskerville, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 214, 168, 0.95) 0, transparent 32%),
          radial-gradient(circle at top right, rgba(173, 219, 208, 0.85) 0, transparent 28%),
          linear-gradient(180deg, #f8f1e7 0%, var(--bg) 48%, #eadcc9 100%);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 18px;
      }

      .panel {
        width: min(100%, 520px);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 28px 24px;
      }

      .brandLockup {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
      }

      .brandBall {
        display: inline-grid;
        place-items: center;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        font-size: 1.9rem;
        box-shadow: 0 10px 24px rgba(45, 29, 15, 0.08);
      }

      .brandText strong {
        display: block;
        font-size: 1.9rem;
        line-height: 1;
      }

      .brandText span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.96rem;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      .formGrid {
        display: grid;
        gap: 14px;
        margin-top: 8px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 700;
      }

      input {
        width: 100%;
        padding: 14px 15px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.72);
        font: inherit;
        transition: border-color 140ms ease, box-shadow 140ms ease, background-color 140ms ease;
      }

      input:focus {
        outline: none;
        border-color: rgba(24, 79, 71, 0.28);
        box-shadow: 0 0 0 4px rgba(24, 79, 71, 0.08);
        background: rgba(255,255,255,0.88);
      }

      .buttonRow {
        display: grid;
        gap: 12px;
        margin-top: 8px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 13px 18px;
        border-radius: 999px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 700;
        cursor: pointer;
      }

      .button.primary {
        background: var(--ink);
        color: #fff9f2;
      }

      .button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 24px rgba(45, 29, 15, 0.08);
      }

      .status {
        margin-top: 14px;
        font-weight: 700;
      }

      .status.error {
        color: var(--accent);
      }

      .status.ok {
        color: var(--accent-2);
      }

      @media (max-width: 760px) {
        .brandText strong {
          font-size: 1.65rem;
        }
      }
    </style>
    <script defer src="./admin-auth.js"></script>
  </head>
  <body>
    <main>
      <section class="panel">
        <div class="brandLockup">
          <div class="brandBall" aria-hidden="true">⚽</div>
          <div class="brandText">
            <strong>HavenIntel</strong>
            <span>Admin access</span>
          </div>
        </div>
        <form class="formGrid" id="adminLoginForm">
          <label>
            Admin email
            <input id="adminEmail" name="adminEmail" type="email" autocomplete="username" placeholder="yeo.tommy@gmail.com" required>
          </label>
          <label>
            Admin password
            <input id="adminPassword" name="adminPassword" type="password" autocomplete="current-password" placeholder="Enter admin password" required>
          </label>
          <div class="buttonRow">
            <button class="button primary" type="submit">Open Admin</button>
          </div>
        </form>
        <div class="status" id="loginStatus"></div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const next = params.get("next") || "admin.html";
      const form = document.getElementById("adminLoginForm");
      const status = document.getElementById("loginStatus");
      const emailInput = document.getElementById("adminEmail");

      emailInput.value = "yeo.tommy@gmail.com";

      if (window.HavenIntelAdminAuth?.isAuthenticated()) {
        status.className = "status ok";
        status.textContent = "Admin session already active.";
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const email = emailInput.value.trim().toLowerCase();
        const password = document.getElementById("adminPassword").value;
        const account = window.HavenIntelAdminAuth?.validateCredentials?.(email, password);

        if (!account) {
          status.className = "status error";
          status.textContent = "Incorrect admin email or password.";
          return;
        }

        window.HavenIntelAdminAuth.signIn(account);
        status.className = "status ok";
        status.textContent = "Admin access granted. Redirecting...";
        window.location.href = `./${next.replace(/^\.\//, "")}`;
      });
    </script>
  </body>
</html>
